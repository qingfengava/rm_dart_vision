hik:
  target_sn: DA1094115
  acquisition_frame_rate: 200
  exposure_time: 1500
  gain: 16.9
serial:
  device_name: /dev/ttyACM0 
  baud_rate: 115200
  char_size: 8
  read_buf_size: 4096


detect:
  enable_gui: true         # 是否显示 HSV mask 调参窗口，比赛时关闭
  hsv:
    low:  [26, 57, 179]      # [H, S, V] 下限 (H:0-179, S:0-255, V:0-255)
    high: [88, 255, 255]    # [H, S, V] 上限
  D_threshold: 30
  contours:
    min_area: 10
    max_area: 50000000
    one_one_diff: 0.4
·  roi:
    enable: false           # 是否启用 ROI 区域限制
    x_ratio: [0.0, 1.0]     # 横向范围 (图像宽度比例)
    y_ratio: [0.0, 1.0]     # 纵向范围 (图像高度比例)

pipeline:
  enable_gui: true           # 是否显示主 frame 窗口，比赛时关闭
  frame_queue_size: 2        # 相机→检测 队列深度
  result_queue_size: 1       # 检测→控制 队列深度

tracker:
  mode: "default"                   # default / base_fixed / base_rand / base_rand_move / base_end_move

  stationary:                      # 静止模式参数
    q_v: 0.5
    q_size: 1.0
    r_pos: 4.0
    r_size: 9.0
    max_lost_frames: 20

  moving:                          # 运动模式参数
    q_v: 200.0
    q_size: 20.0
    r_pos: 4.0
    r_size: 9.0
    max_lost_frames: 5

  v_max: 200.0                     # 初始速度不确定性 (px/s)
  gate_threshold: 9.49             # 马氏距离门控 χ²(4, 0.95)
  confirm_frames: 3                # 新 track 确认所需连续帧数
  max_tentative_frames: 5          # 未确认 track 最大存活帧数
  transition_alpha: 0.3            # Q 平滑过渡因子
  iteration_num: 2                 # EKF GN 迭代次数

  auto_reset:
    jump_distance_px: 50           # 判定跳变的最短像素距离
    fast_confirm_frames: 1         # reset 后快速确认帧数
    fast_confirm_duration: 10      # 快速确认持续帧数 (200fps=50ms)

  auto_maneuver:
    stationarity_window: 20        # 静止检测滑窗帧数 (200fps=100ms)
    stationarity_threshold: 3.0    # 位置标准差阈值 (px)

recorder:
  enable: true               # 是否启用异步录制
  path: "data/video"          # 输出目录, 文件名自动加时间戳
  fps: 30                     # 视频播放帧率
  codec: "MJPG"               # FourCC 编码
  scale: 0.5                  # 录制分辨率缩放, 1.0=原画
  record_fps: 30              # 实际录制帧率, 自动按 Pipeline 帧率跳帧

